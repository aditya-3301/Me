<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<script>
  // Same Safari SVG-filter-backdrop fallback as the main page - see mainstyle.css.
  (function(){
    const ua = navigator.userAgent;
    const isSafari = /^((?!chrome|android|crios|fxios|edgios).)*safari/i.test(ua);
    if (isSafari) document.documentElement.classList.add('is-safari');
    const coarse = matchMedia('(pointer:coarse)').matches;
    const lowCores = (navigator.hardwareConcurrency || 8) <= 4;
    const lowMem = (navigator.deviceMemory || 8) <= 4;
    const smallScreen = Math.min(innerWidth, innerHeight) <= 480;
    if (coarse && (lowCores || lowMem || smallScreen)) {
      document.documentElement.classList.add('is-lowpower');
    }
  })();
</script>
<title>Photography — Aditya Shankar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,500&family=Work+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="mainstyle.css">
<style>
  /* Gallery-page-only top bar: same liquid-glass pill treatment as the photo
     subnav on the main site, just promoted to the primary/only nav here
     (fixed at the top, always visible - no scroll-triggered fade-in) and
     with a back link to the homepage in place of the Projects/About Me links. */
  .gallery-nav{
    position:fixed; top:24px; left:0; right:0; z-index:25;
    display:flex; justify-content:center; padding:0 16px;
  }
  .gallery-nav-inner{
    display:flex; align-items:center; gap:4px; padding:6px; border-radius:18px;
    background:rgba(0,0,0,0.2);
    backdrop-filter:url(#glass-filter-_r_12b_) saturate(1);
    -webkit-backdrop-filter:url(#glass-filter-_r_12b_) saturate(1);
    box-shadow:rgba(255,255,255,0.1) 0px 0px 0px 0.5px inset, rgba(0,0,0,0.1) 0px 4px 16px;
  }
  html.is-safari .gallery-nav-inner, html.is-lowpower .gallery-nav-inner{
    backdrop-filter: blur(14px) saturate(160%) !important;
    -webkit-backdrop-filter: blur(14px) saturate(160%) !important;
  }
  .gallery-nav-back{
    font-family:'Newsreader', serif; font-size:1rem; color:var(--ink);
    text-decoration:none; padding:7px 14px; border-radius:14px; opacity:0.9;
    transition:.2s ease;
  }
  .gallery-nav-back:hover{ opacity:1; background:rgba(255,255,255,0.08); }
  .gallery-page-head{
    max-width:1100px; margin:0 auto; padding:130px 24px 0;
  }
  .gallery-page-head h1{
    font-family:'Newsreader', serif; font-weight:600; font-size:clamp(2rem,4.5vw,3rem);
    letter-spacing:-0.02em; color:var(--ink); margin-bottom:8px;
  }
  .gallery-page-head p{
    font-family:'Work Sans', sans-serif; color:var(--ink-dim); font-size:14.5px; margin-bottom:12px;
  }
  .gallery-page-grid-wrap{
    max-width:1100px; margin:0 auto; padding:0 24px 100px;
  }
</style>
</head>
